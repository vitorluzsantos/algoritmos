<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contagem Simples</title>
</head>
<body>

<button onclick="contar()">V1 (for)</button>
<button onclick="contar2()">V2 (while)</button>

<div id="res"></div>

<script>
function contar() {
    let res = document.getElementById("res");
    res.innerHTML = "";

    for (let i = 1; i <= 15; i++) {
        res.innerHTML += i + "<br>";
    }
}

function contar2() {
    let res = document.getElementById("res");
    res.innerHTML = "";

    let i = 1;
    while (i <= 15) {
        res.innerHTML += i + "<br>";
        i++;
    }
}
</script>

</body>
</html>
