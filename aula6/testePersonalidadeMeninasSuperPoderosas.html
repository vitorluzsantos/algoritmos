<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title></title>
		<link href="css/style.css" rel="stylesheet">
	</head>
	<body>
		<div class="mainContent">
			<input type="number" id="iptCoragem" placeholder="Digite o quanto voce tem de coragem">
			<input type="number" id="iptInteligencia" placeholder="Digite o quanto voce tem de inteligencia">
			<input type="number" id="iptSensibilidade" placeholder="Digite o quanto voce tem de sensibilidade">
			<input type="number" id="iptTemperamento" placeholder="Digite o quanto voce tem de temperamento">
			<button onclick="teste()">Teste de personalidade</button>
		</div>
		<div id="resultado"></div>
	
	</body>
	<script>
		function teste(){
			let coragem = Number(iptCoragem.value);
			let inteligencia = Number(iptInteligencia.value);
			let sensibilidade = Number(iptSensibilidade.value);
			let temperamento = Number(iptTemperamento.value);

			if((inteligencia >= 8 && coragem >= 7 && temperamento <= 6) || 
				 (inteligencia > coragem && inteligencia > sensibilidade)){

				resultado.innerHTML = `<img src="img/florzinha.gif">`;
				resultado.innerHTML += `<p style='color:#C2185B;'>Você é a florzinha</p>`;
				document.body.style.backgroundColor = 'pink';
			}
			else if((sensibilidade >= 8 && temperamento <= 5) || 
							(sensibilidade > inteligencia && sensibilidade > coragem)){

				resultado.innerHTML = `<img src="img/lindinha.gif">`;
				resultado.innerHTML += `<p style='color:blue;'>Você é a lindinha</p>`;
				document.body.style.backgroundColor = '#4FC3F7';
			}
			else{

				resultado.innerHTML = `<img src="img/docinho.gif">`;
				resultado.innerHTML += `<p style='color:green;'>Você é a docinho</p>`;
				document.body.style.backgroundColor = '#66BB6A';
			}
		}
	</script>
</html>
