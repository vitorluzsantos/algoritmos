<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title></title>
		<link href="css/style.css" rel="stylesheet">
	</head>
	<body>
		<input id="ipt_valor">
		<button onclick="mostrar()">ver cafes</button>
		<div id="resultado"></div>
	</body>
	<script>
	function mostrar(){
		let qtd_cafes = Number(ipt_valor.value);
		let frase_final = "";
		for(let i =0; i < qtd_cafes; i++){
			frase_final += `Mostrando o cafe ${i + 1}, = &#x2615; <br>`;
		}
		resultado.innerHTML = frase_final;
	}
	</script>
</html>
