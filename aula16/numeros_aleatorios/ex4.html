<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>ex4</title>
</head>
<body>
	<button onclick="sortear()">Sortear Nota</button>
	<div id="div_resultado"></div>

	<script>
		function sortear(){
			let nota = (Math.random() * 10).toFixed(1);
			div_resultado.innerHTML = nota;
		}
	</script>
</body>
</html>
