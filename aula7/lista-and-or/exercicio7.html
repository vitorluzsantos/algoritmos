<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Autenticacao segura</title>
	</head>
	<body>
		<p>Digite o seu nome de usuario</p>
		<input id="idUsuario" >
		<br>
		<p>Digite a senha</p>
		<input id="idSenha" >
		<p>Digite uma informação pessoal sua</p>
		<input id="informacaoPessoal" >
		<br>
		<br>
		<button onclick="autenticar()">Autenticar</button>
		<div id="resultado"></div>
	</body>
	<script>
	let contador = 3;
	function autenticar(){
		let senha = idSenha.value;
		let usuario = idUsuario.value;
		let infoPessoal = informacaoPessoal.value;

		if(contador != 0){
			if(usuario.toLowerCase() == "ana" && senha == "braga" && (infoPessoal == "1949" || infoPessoal == "louro josé")){
				resultado.innerHTML = "Usuario autenticado";
			}
			else{
				contador --;
				resultado.innerHTML = "Falha na autenticação";
				resultado.innerHTML = `<br>Você ainda tem ${contador} tentativa(s)`;
			} 
		}
		else{
			resultado.innerHTML = "Usuário BLOQUEADO! procure o seu gerente";
		}
	}
	</script>
</html>
