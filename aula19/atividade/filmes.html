<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h2>Buscar Filmes:</h2>
  
  <span>Nome:</span>
  <input type="text" id="ipt_nome">
  <button onclick="pesquisarNome()">Pesquisar</button>

  <span>Diretor:</span>
  <input type="text" id="ipt_diretor">
  <button onclick="pesquisarDiretor()">Pesquisar</button>

  <span>Ano:</span>
  <select id="ipt_ano_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="number" id="ipt_ano">
  <button onclick="pesquisarAno()">Pesquisar</button><br><br>

  <span>Gênero:</span>
  <input type="text" id="ipt_genero">
  <button onclick="pesquisarGenero()">Pesquisar</button>

  <span>Média:</span>
  <select id="ipt_media_parametro">
    <option value="maior_igual">&gt;=</option>
    <option value="igual">==</option>
    <option value="menor_igual">&lt;=</option>
  </select>
  <input type="text" id="ipt_media">
  <button onclick="pesquisarMedia()">Pesquisar</button><br><br>

  <button onclick="pesquisar()">Mostrar Todos</button>

  <div id="div_resultado"></div>
</body>
</html>
<script src="dados.js"></script>
<script>

	function calcularMedia(notas){
		let media = 0;
		for(let i = 0; i < notas.length; i ++){
			media += notas[i];
		}
		return (media / notas.length).toFixed(2);
	}
	
	function montarResultado(lista){
		div_resultado.innerHTML = '';
		for(let i = 0; i < lista.length; i++){
			div_resultado.innerHTML = 
			`
				Nome: ${lista[i].nome} | Diretor: ${lista[i].diretor} | Ano: ${lista[i].ano} | Média: ${calcularMedia(lista[i].media)}
			`
		}
	}
	function pesquisarNome(){
		let nomeDigitado = ipt_nome.value.toLowerCase();
		let filmesEncontrados = [];
		for(let i = 0; i < filmes.length; i++){
			if(filmes[i].nome.toLowerCase().includes(nomeDigitado)){
				filmesEncontrados.push(filmes[i]);
			}
		}
		montarResultado(filmesEncontrados);
	}
	function pesquisarDiretor(){
		let filmesEncontrados = [];
		let nomeDigitado = ipt_diretor.value.toLowerCase();
		for(let i = 0; i < filmes.length; i++){
			if(filmes[i].diretor.toLowerCase().includes(nomeDigitado)){
				filmesEncontrados.push(filmes[i]);
			}
		}
	}
	function pesquisarAno(){
		let filmesEncontrados = [];
		let anoDigitado = Number(ipt_ano.value);
		let anoParametro = ipt_ano_parametro.value;
		let mensagem = "";

		if(anoParametro == 'menor_igual'){
			for(let i = 0; i < filmes.length; i++){
				if(filmes[i].ano <= anoDigitado){
					filmesEncontrados.push(filmes[i]);
				}
			}
		}
		else if(anoParametro == 'igual'){
			for(let i = 0; i < filmes.length; i++){
				if(filmes[i].ano == anoDigitado){
					filmesEncontrados.push(filmes[i]);
				}
			}
		}
		else if(anoParametro == 'maior_igual'){
			for(let i = 0; i < filmes.length; i++){
				if(filmes[i].ano >= anoDigitado){
					filmesEncontrados.push(filmes[i]);
				}
			}
		}
		montarResultado(filmesEncontrados);
	}

	function pesquisarGenero(){
		let filmesEncontrados = [];
		let generoDigitado = ipt_genero.value.toLowerCase();
		let mensagem = "";
		for(let i = 0; i < filmes.length; i++){
			for(let j = 0; j< filmes[i].generos.length;j++){
				if(filmes[i].generos[j].toLowerCase().includes(generoDigitado)){
					filmesEncontrados.push(filmes[i]);
				}
			}
		}
		montarResultado(filmesEncontrados);
	}

	function pesquisar(){
		montarResultado(filmes);
	}
</script>
