<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>sistema de avaliação de atendimento</title>
	</head>
	<body>
		<input type="number" placeholder="Digite a nota do atendimento" id="idAtendimento">
		<button onclick="avaliar()">Avaliar atendimento</button>
		<div id="divMensagem"></div>
	</body>
	<script>
	function avaliar(){
		let nota = Number(idAtendimento.value);
		
		console.log(nota);
		if(nota < 0 || nota >10){
			divMensagem.innerHTML = "Nota inválida";
		}else if(nota > 0 && nota < 5){
			divMensagem.innerHTML = "Não aprovado";
		}else if(5 <= nota <= 6){
			divMensagem.innerHTML = "Neutro";
		}else{
			divMensagem.innerHTML = "Aprovado";
		}
		
		
	}
	</script>
</html>
