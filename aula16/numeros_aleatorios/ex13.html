<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>ex13</title>
</head>
<body>
	<button onclick="sortear()">Sortear temperatura</button>
	<div id="div_resultado"></div>

	<script>
		function sortear(){
			let temp = Math.floor(Math.random()*41) - 20;

			let msg = "";

			if(temp < 1){
				msg = "Dá pra conservar qualquer alimento";
			}else if(temp <= 10){
				msg = "Conserva a maioria dos alimentos";
			}else{
				msg = "Estraga a maioria dos alimentos";
			}

			div_resultado.innerHTML = `Temperatura: ${temp}<br>${msg}`;
		}
	</script>
</body>
</html>
