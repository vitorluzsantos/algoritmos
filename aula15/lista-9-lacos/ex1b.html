<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Ex1B</title>
	</head>
	<body>

		<input id="idPalavra">
		<button onclick="adicionar()">Adicionar</button>
		<button onclick="exibirDuplicados()">Exibir Duplicados</button>
		<button onclick="removerDuplicatas()">Remover Duplicatas</button>

		<div id="div_resultado"></div>

	</body>

	<script>
let vetor = [];

function adicionar(){
	vetor.push(idPalavra.value);
	exibir();
}

function existe(vet, valor){
	for(let i = 0; i < vet.length; i++){
		if(vet[i] == valor){
			return true;
		}
	}
	return false;
}

function exibirDuplicados(){
	let duplicados = [];

	for(let i = 0; i < vetor.length; i++){
		let contador = 0;

		for(let j = 0; j < vetor.length; j++){
			if(vetor[i] == vetor[j]){
				contador++;
			}
		}

		if(contador > 1 && !existe(duplicados, vetor[i])){
			duplicados.push(vetor[i]);
		}
	}

	div_resultado.innerHTML = duplicados;
	exibir();
}

function removerDuplicatas(){
	let novo = [];

	for(let i = 0; i < vetor.length; i++){
		if(!existe(novo, vetor[i])){
			novo.push(vetor[i]);
		}
	}

	vetor = novo;
	exibir();
}

function exibir(){
	let msg = "";
	for(let i = 0; i < vetor.length; i++){
		msg += "<br>" + vetor[i];
	}
	div_resultado.innerHTML += msg;
}
	</script>
</html>
