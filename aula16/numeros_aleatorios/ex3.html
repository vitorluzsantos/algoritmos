<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>ex3</title>
</head>
<body>
	<button onclick="jogar()">Jogar dado</button>
	<div id="div_resultado"></div>

	<script>
		function jogar(){
			let numero = Math.floor(Math.random() * 20) + 1;

			div_resultado.innerHTML = `
				<div style="
					width:100px;
					height:100px;
					background:black;
					color:white;
					display:flex;
					align-items:center;
					justify-content:center;
					font-size:30px;
				">
					${numero}
				</div>
			`;
		}
	</script>
</body>
</html>
