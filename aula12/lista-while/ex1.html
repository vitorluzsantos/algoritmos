<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title></title>
		<link href="css/style.css" rel="stylesheet">
	</head>
	<body>
		<button onclick="contar()">Contar</button>
		<div id="resultado"></div>
	</body>
	<script>
	function contar(){
		let contador = 1;
		while(contador <= 15){
			resultado.innerHTML += `${contador} `;
			contador ++;
		}
	}
	</script>
</html>
