<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>ex7</title>
</head>
<body>
	<button onclick="sortear()">Quero um número cabalístico!</button>
	<div id="div_resultado"></div>

	<script>
		function sortear(){
			let n = Math.floor(Math.random()*15)+1;
			let especiais = [3,4,7,10,12];

			let msg = especiais.includes(n)
				? "Eu S2 números cabalísticos!"
				: "Ah, me dá um número bom na próxima!";

			div_resultado.innerHTML = n + "<br>" + msg;
		}
	</script>
</body>
</html>
