<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>ex16</title>
</head>
<body>
	Nome: <input id="nome"><br>
	Número da sorte: <input id="num"><br>

	<button onclick="sortear()">Sortear</button>
	<div id="div_resultado"></div>

	<script>
		let tentativas = 0;

		function sortear(){
			let n = Number(num.value);

			if(n < 1 || n > 10){
				alert("Digite entre 1 e 10");
				return;
			}

			tentativas++;

			let sorteado = Math.floor(Math.random()*10)+1;

			if(sorteado == n){
				div_resultado.innerHTML = 
				`Parabéns, ${nome.value} você foi sorteado(a) após ${tentativas} sorteios!`;
			}
		}
	</script>
</body>
</html>
