<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>multiplos de cinco</title>
		<link href="css/style.css" rel="stylesheet">
	</head>
	<body>
		<input placeholder="Digite um número entre 20 e 100" id="idNumero">
		<button onclick="calcularMultiplos()">Adoro multiplos de 5</button>
		<div id="resultado"></div>
	</body>
	<script>
	function calcularMultiplos(){
		let numero = Number(idNumero.value);
		let contador = 0;
		if(numero >= 20 && numero <= 100){
			while(contador < numero){
				if(contador % 5 == 0){
					resultado.innerHTML += `${contador}, `;
				}
				contador++
			}
		}
		else{
			resultado.innerHTML = `Valor invalido`;
		}
	}
	</script>
</html>
