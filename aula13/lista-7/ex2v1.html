<!DOCTYPE html>
<html>
<body>

<h2>Café com Leite</h2>

<input type="number" id="qtd" placeholder="Xícaras">
<button onclick="cafeFor()">Ver</button>

<div id="res"></div>

<script>
function cafeFor() {
  var qtd = Number(qtd.value);
  var leite = qtd * 1;
  var cafe = qtd * 2;
  var texto = "";

  // leite
  for (var i = 1; i <= leite; i++) {
    texto += '<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" width="30">';
  }

  texto += "<br>";

  // café
  for (var i = 1; i <= cafe; i++) {
    texto += '<img src="https://cdn-icons-png.flaticon.com/512/924/924514.png" width="30">';
  }

  res.innerHTML = texto;
}
</script>

</body>
</html>
