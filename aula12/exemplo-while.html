<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>WHILE</title>
		<link href="css/style.css" rel="stylesheet">
	</head>
	<body>
		<div id="resultado"></div>
	</body>
	<script>
		let contador = 0;
		while(contador <= 9){
			resultado.innerHTML += `O contador é ${contador}<br>`;
			contador++;
		}
		resultado.innerHTML += `<br>Agora com for: <br>`;
		for(let i = 0; i <= 9; i++){
			resultado.innerHTML += `O i é: R${i} <br>`;
		}
	</script>
</html>
