<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>tratamento</title>
	</head>
	<body>
		<input id="idSala">
		<button onclick="exibir()">Exibir</button>
		<div id="resultado"></div>
	</body>
	<script>
	function exibir(){
		// desafio => voce é do curso de ${curso}, da turma ${turma}, e iniciou em ${inicio}
		//
		// formato de digitacao => 1ADSA 20252, 1CCOA 20261
		let sala = idSala.value;
		let curso = sala.substring(1,4);
		let turma = sala.substring(10,11) + sala.substring(9, 10);
		let inicio = sala.substring(6,10);
		let semestre = sala.substring(0,1);
		
		let contemCCO = turma.includes("CCO");
		let indiceCCO = turma.indexOf("CCO");

		let teste = turma.substring(2,5);

		resultado.innerHTML = `
			Contem CCO: ${contemCCO} <br>
			indiceCCO: ${indiceCCO} <br>
			Teste substring: ${teste} <br>
			Voce é do curso de ${curso}, da turma ${turma}, e iniciou em ${inicio}, seu semestre é ${semestre}
		`;
	}
	</script>
</html>
