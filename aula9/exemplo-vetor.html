<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>exemplo vetor</title>
	</head>
	<body>
		<input id="inputFruta">
		<button onclick="exibir()">Exibir</button>
		<button onclick="adicionar()">Adicionar</button>
		<div id="resultado"></div>
	</body>
	<script>
	let frutas = ["Melão","Maçã","Maracuja","Melancia","Banana","Kiwi"];

	function adicionar(){
		let fruta = inputFruta.value;
		frutas.push(fruta);

		resultado.innerHTML += `<br> Vetor atualizado: ${frutas}`
	}

	function exibir(){
		let tamanho = frutas.length;
		let primeiraFruta = frutas[0];
		let ultimaFruta = frutas[tamanho - 1];
		resultado.innerHTML = `
			Sua lista tem ${tamanho} frutas <br>
			A primeira fruta é ${primeiraFruta} frutas <br>
			A última fruta é ${ultimaFruta} <br>
			Frutas: ${frutas}
		`
	}
	</script>
</html>
