<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>numeros misteriosos</title>
	</head>
	<body>
		<button onclick="numeros()">numeros cabalisticos</button>
		<div id="resultado"></div>
	</body>
	<script>
	function numeros(){
		let numerosCabalisticos = [3, 4 , 7, 10, 12];
		let contador = 0;
		while(contador <= 30){
			if(!numerosCabalisticos.includes(contador)){
				resultado.innerHTML += `${contador} `;
			}
			contador++
		}
	}
	</script>
</html>
