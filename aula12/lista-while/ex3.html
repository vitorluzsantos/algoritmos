<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>exercicio 3</title>
		<link href="css/style.css" rel="stylesheet">
	</head>
	<body>
		<input id="idInput">
		<button onclick="seteVezes()">Diga algo sobre a materia de algoritmos</button>
		<div id="resultado"></div>
	</body>
	<script>
	function seteVezes(){
		resultado.innerHTML = ``;
		let frase = idInput.value;
		let contador = 0;

		while(contador < 7){
			resultado.innerHTML += `<br>${contador + 1}. ${frase}`;
			contador ++;
		}
	}
	</script>
</html>
